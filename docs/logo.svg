<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" width="400" height="80">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background (transparent) -->

  <!-- FVG Icon: Three candles representing Fair Value Gap -->
  <g transform="translate(8, 8)" filter="url(#glow)">
    <!-- Candle 1 (bearish - sets the gap top) -->
    <rect x="0" y="8" width="14" height="44" rx="2" fill="url(#gold)" opacity="0.5"/>
    <rect x="4" y="2" width="6" height="56" rx="1" fill="url(#gold)" opacity="0.7"/>

    <!-- Gap indicator (the FVG itself) -->
    <rect x="16" y="18" width="18" height="24" rx="3" fill="url(#gold)" opacity="0.15" stroke="url(#gold)" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Gap arrows -->
    <path d="M20 20 L25 26 L30 20" fill="none" stroke="url(#goldLight)" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M20 40 L25 34 L30 40" fill="none" stroke="url(#goldLight)" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Candle 2 (impulse - creates the gap) -->
    <rect x="36" y="4" width="14" height="52" rx="2" fill="url(#gold)" opacity="0.6"/>
    <rect x="40" y="0" width="6" height="60" rx="1" fill="url(#gold)"/>

    <!-- Candle 3 (reaction - confirms the gap) -->
    <rect x="54" y="12" width="14" height="40" rx="2" fill="url(#gold)" opacity="0.5"/>
    <rect x="58" y="6" width="6" height="52" rx="1" fill="url(#gold)" opacity="0.8"/>
  </g>

  <!-- "Fvg" text -->
  <text x="90" y="52" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="800" letter-spacing="-1.5" fill="white">Fvg</text>

  <!-- "Gold" text with gold gradient -->
  <text x="192" y="52" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="800" letter-spacing="-1.5" fill="url(#gold)">Gold</text>

  <!-- Subtle underline accent -->
  <rect x="90" y="58" width="170" height="2" rx="1" fill="url(#gold)" opacity="0.3"/>
</svg>
